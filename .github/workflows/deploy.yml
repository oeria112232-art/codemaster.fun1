        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: 145.79.212.111
          username: u303053010.codemaster.fun
          password: ${{ secrets.FTP_PASSWORD }}
