<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Master - الصفحة غير موجودة</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #090D16; color: #fff; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 24px; }
    .code { font-size: 120px; font-weight: 900; background: linear-gradient(135deg, #1080E0, #40A0FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .msg { font-size: 18px; color: #A6ABB6; margin: 16px 0 32px; }
    a { display: inline-block; padding: 14px 32px; background: #1080E0; color: #fff; text-decoration: none; border-radius: 14px; font-weight: 700; transition: background 0.3s; }
    a:hover { background: #2090FF; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="msg">الصفحة التي تبحث عنها غير موجودة</p>
    <a href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
